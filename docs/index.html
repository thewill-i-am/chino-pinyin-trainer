function speak(t){const u=new SpeechSynthesisUtterance(t);u.lang='zh-CN';speechSynthesis.speak(u);} function speakCurrent(){if(cur) speak(cur.term);}
function showTab(t){document.getElementById('vocabSec').style.display=t==='vocab'?'block':'none';document.getElementById('grammarSec').style.display=t==='grammar'?'block':'none';document.getElementById('tabV').classList.toggle('active',t==='vocab');document.getElementById('tabG').classList.toggle('active',t==='grammar');}
function renderTable(){const q=(document.getElementById('q').value||'').toLowerCase();const c=document.getElementById('cat').value;view=data.filter(x=>(!c||x.category===c)&&(!q||x.term.includes(q)||x.pinyin.toLowerCase().includes(q)||x.meaning.toLowerCase().includes(q)));document.getElementById('count').textContent=`${view.length} resultados`;document.getElementById('tb').innerHTML=view.slice(0,500).map(x=>`<tr><td>${x.term}</td><td>${x.pinyin}</td><td>${x.meaning}</td><td>${x.category}</td></tr>`).join('');if(!cur || !view.find(v=>v.term===cur.term)) nextCard();}
function nextCard(){if(!view.length)return;cur=view[Math.floor(Math.random()*view.length)];document.getElementById('term').textContent=cur.term;document.getElementById('meta').textContent=`${cur.meaning} · ${cur.category}`;document.getElementById('ans').value='';document.getElementById('result').textContent='';}
function check(){if(!cur)return;const g=document.getElementById('ans').value.trim();const t=cur.pinyin.trim();const ex=g.toLowerCase()===t.toLowerCase();const near=nt(g)===nt(t);const r=document.getElementById('result');if(ex){ok++;r.textContent='✅ Correcto con tonos';} else if(near){ok++;r.textContent='🟡 Correcto sin tonos. '+t;} else {bad++;r.textContent='❌ '+t;}}
function renderRules(){document.getElementById('rules').innerHTML=patterns.map(p=>`<div style="margin:8px 0;padding:8px;border:1px solid #E5E7EB;border-radius:10px"><b>${p.rule}</b><div class='mut'>${p.exp}</div><div>✅ ${p.ok}</div><div>❌ ${p.bad}</div></div>`).join('');}
function pickQuestion(){const scored=quiz.map((it,idx)=>({idx,w:weakness(it.ruleId)})).sort((a,b)=>b.w-a.w);const half=Math.max(6,Math.floor(scored.length/2));return quiz[scored[Math.floor(Math.random()*half)].idx];}
let currentQ=null;
function renderG(){currentQ=pickQuestion();document.getElementById('qPrompt').textContent=`${gi+1}) ${currentQ.prompt} [Regla: ${currentQ.ruleId}]`;document.getElementById('qOpts').innerHTML=currentQ.options.map((o,i)=>`<button class='opt' onclick='answerG(${i})'>${o}</button>`).join('');document.getElementById('gScore').textContent=`score: ${gOk}/${gi}`;renderRuleStats();}
function answerG(i){const good=i===currentQ.answer;if(good) gOk++;bump(currentQ.ruleId,good);gi++;renderG();}
function nextG(){gi++;renderG();}
function renderRuleStats(){const by=patterns.map(p=>{const s=prog[p.id]||{ok:0,bad:0};const tot=s.ok+s.bad;const acc=tot?Math.round(s.ok*100/tot):0;return {id:p.id,rule:p.rule,ok:s.ok,bad:s.bad,acc};}).sort((a,b)=>a.acc-b.acc);document.getElementById('ruleStats').innerHTML=by.map(r=>`<div style="padding:6px 0;border-bottom:1px solid #eee"><b>${r.rule}</b> <span class='mut'>(${r.id})</span><br><span class='mut'>ok:${r.ok} · bad:${r.bad} · precisión:${r.acc}%</span></div>`).join('');}
const cats=[...new Set(data.map(x=>x.category))].sort();document.getElementById('cat').insertAdjacentHTML('beforeend', cats.map(c=>`<option>${c}</option>`).join(''));document.getElementById('q').addEventListener('input',renderTable);document.getElementById('cat').addEventListener('change',renderTable);document.getElementById('ans').addEventListener('keydown',e=>{if(e.key==='Enter')check();});renderTable();nextCard();renderRules();renderG();renderRuleStats();
</script></div></body></html>
